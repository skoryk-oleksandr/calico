version: v1.0

name: IPTables

agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

execution_time_limit:
  hours: 12

global_job_config:
  prologue:
    commands_file: ../scripts/global_prologue.sh
  epilogue:
    always:
      commands:
        - ~/calico/.semaphore/end-to-end/scripts/global_epilogue.sh
  secrets:
    - name: marvin-github-ssh-private-key
    - name: banzai-secrets
  env_vars:
    # This should match default flags with the additional skip of the "Proxy version v1". There is a problem with the server pod failing to bind to the port for listening.
    - name: K8S_E2E_FLAGS
      value: --ginkgo.focus=should.correctly.implement.Host.Endpoint.NetworkPolicy --ginkgo.skip=(\[Slow\]|\[Disruptive\]|\[DataPath\]|Proxy.version.v1.should.proxy.through.a.service.and.a.pod|WireGuard)
    - name: DATAPLANE
      value: "CalicoIptables"
    - name: IPV4_POD_CIDR
      value: "192.168.0.0/16"
    - name: FUNCTIONAL_AREA
      value: "iptables.yml"
    - name: USE_PRIVATE_REGISTRY
      value: "true"
    - name: PRIVATE_REGISTRY
      value: "quay.io/"
    - name: K8S_E2E_IMAGE
      value: "gcr.io/tigera-dev/k8s-e2e@sha256:805cc9d28cff0a0cee4de84a5fe32072461646e4bd65a89a82a332203cd9f421"


blocks:
  # This is the old wireguard tests
  - name: WireGuard regression k8s-e2e
    dependencies: []
    task:
      jobs:
        - name: kdd - new
          execution_time_limit:
            hours: 7
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
          matrix:
            - env_var: K8S_VERSION
              values: ["stable"]
          env_vars:
            - name: DISABLE_IPIP
              value: "true"
              # Single VPC only
            - name: VPC_SUBNETS
              value: '["172.16.101.0/24"]'
            - name: IPAM_TEST_POOL_SUBNET
              value: "10.0.0.0/29"
            - name: PROVISIONER
              value: "aws-kubeadm"

        - name: kdd - old
          execution_time_limit:
            hours: 7
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
          matrix:
            - env_var: K8S_VERSION
              values: ["stable-3"]
          env_vars:
            # The skip "EndpointSlice\|Services\sshould" is needed to skip Endpoint slice tests which are only possible in k8s 1.21+
            # The skip "Ingress.API|IngressClass.API" is needed to skip Ingress tests which are only possible in k8s 1.21+
            # The skip "Proxy.version.v1.*pod.and.service.Proxy.\[" is needed to skip an upstream test that only works on k8s 1.24+
            - name: DISABLE_IPIP
              value: "true"
              # Single VPC only
            - name: VPC_SUBNETS
              value: '["172.16.101.0/24"]'
            - name: IPAM_TEST_POOL_SUBNET
              value: "10.0.0.0/29"
            - name: PROVISIONER
              value: "aws-kubeadm"

        - name: AKS w AKS CNI + Overlay
          execution_time_limit:
            hours: 7
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
          env_vars:
            - name: ENABLE_EXTERNAL_NODE # No code in banzai-core yet for external nodes on Azure
              value: "false"
            - name: NETWORK_PLUGIN_MODE
              value: "overlay"
            - name: AZ_NETWORK_PLUGIN
              value: "azure"
            - name: IPV4_POD_CIDR
              value: "10.244.0.0/16"
            - name: INSTALLER
              value: "operator"
            - name: PROVISIONER
              value: "azr-aks"
            - name: AZ_CREATE_MODE
              value: AKS
              # External node is false, so we should skip external node tests: "ExternalNode|outside.the.cluster|external.to.nodeport"
              # This uses AKS-CNI, so Strict Affinity and MTU tests do not apply: "MTU|StrictAffinity"
      env_vars:
        - name: USE_HASH_RELEASE
          value: "true"
        - name: ENABLE_WIREGUARD
          value: "true"



promotions:
  - name: Cleanup jobs
    pipeline_file: cleanup.yml
    auto_promote:
      when: "result = 'stopped'"

after_pipeline:
  task:
    jobs:
      - name: Reports
        commands:
          - test-results gen-pipeline-report --force
