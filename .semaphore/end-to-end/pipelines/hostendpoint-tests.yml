version: v1.0

name: IPTables

agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204

execution_time_limit:
  hours: 12

global_job_config:
  prologue:
    commands_file: ../scripts/global_prologue.sh
  epilogue:
    always:
      commands:
        - ~/calico/.semaphore/end-to-end/scripts/global_epilogue.sh
  secrets:
    - name: marvin-github-ssh-private-key
    - name: banzai-secrets
  env_vars:
    # This should match the default, flags with the additional skip of the "Proxy version v1". There is a problem with the server pod failing to bind to the port for listening.
    - name: K8S_E2E_FLAGS
      value: --ginkgo.focus=should.correctly.implement.Host.Endpoint.NetworkPolicy --ginkgo.skip=(\[Slow\]|\[Disruptive\]|\[DataPath\]|Proxy.version.v1.should.proxy.through.a.service.and.a.pod|WireGuard)
    - name: DATAPLANE
      value: "CalicoIptables"
    - name: IPV4_POD_CIDR
      value: "192.168.0.0/16"
    - name: FUNCTIONAL_AREA
      value: "iptables.yml"
    - name: USE_PRIVATE_REGISTRY
      value: "true"
    - name: PRIVATE_REGISTRY
      value: "quay.io/"
    - name: K8S_E2E_IMAGE
      value: "gcr.io/tigera-dev/k8s-e2e@sha256:a42b509f4da30e425ba9eb01e2aaf58cddc5d299e2e79c9a4d79dee2da572586"


blocks:
  # this is from the old openshift file
  - name: Openshift OCP
    dependencies: []
    task:
      jobs:
        - name: hashrelease
          execution_time_limit:
            hours: 6
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
          matrix:
            - env_var: OPENSHIFT_VERSION
              values: ["4.20.6"]
      env_vars:
        - name: PROVISIONER
          value: aws-openshift
        - name: INSTALLER
          value: operator

  # this is from the old arm64 file
  - name: ARM64 - smoke tests
    dependencies: []
    task:
      env_vars:
        - name: INSTALLER
          value: operator
        - name: STERN_CHECK
          value: DISABLED
      jobs:
        - name: AKS - ARM64
          execution_time_limit:
            hours: 4
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
          matrix:
            - env_var: K8S_VERSION
              values: ["stable-1"]
            - env_var: AZ_NETWORK_PLUGIN
              values: ["azure", "none"]
            - env_var: CLUSTER_MODE
              values: [""]

          env_vars:
            - name: PROVISIONER
              value: azr-aks
            - name: AZ_VM_SIZE
              value: "Standard_D4plds_v5"

promotions:
  - name: Cleanup jobs
    pipeline_file: cleanup.yml
    auto_promote:
      when: "result = 'stopped'"

after_pipeline:
  task:
    jobs:
      - name: Reports
        commands:
          - test-results gen-pipeline-report --force
